{% extends 'base.html' %}

{% block title %}
Профиль
{% endblock %}

{% block content %}

<h1>Мой профиль</h1>

<div class="card">

    <div class="card-body">

        <p>
            <strong>Имя пользователя:</strong>
            {{ request.user.username }}
        </p>

        <p>
            <strong>Email:</strong>
            {{ request.user.email|default:"Не указан" }}
        </p>

        <p>
            <strong>Количество заказов:</strong>
            {{ orders_count }}
        </p>

        <p>
            <strong>Товаров в корзине:</strong>
            {{ cart_items_count }}
        </p>

    </div>

</div>

{% endblock %}
