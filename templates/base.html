<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>
        {% block title %}
            Bookstore
        {% endblock %}
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">

        <a class="navbar-brand"
           href="{% url 'book_list' %}">
            Bookstore
        </a>

        <div class="navbar-nav">
            <a class="nav-link"
               href="{% url 'book_list' %}">
                Каталог
            </a>

            <a class="nav-link"
               href="{% url 'cart_detail' %}">
                Корзина
            </a>

            {% if user.is_authenticated %}

            <a class="nav-link"
                href="{% url 'order_list' %}">
                Заказы
            </a>

            <a class="nav-link"
            href="{% url 'profile' %}">
                Профиль
            </a>

            <span class="navbar-text me-3">
                {{ user.username }}
            </span>

            <form
                action="{% url 'logout' %}"
                method="post">

                {% csrf_token %}

                <button
                    type="submit"
                    class="btn btn-link nav-link">
                    Выход
                </button>

            </form>

            {% else %}

                <a class="nav-link"
                href="{% url 'login' %}">
                    Вход
                </a>

                <a class="nav-link"
                href="{% url 'register' %}">
                    Регистрация
                </a>

            {% endif %}
        </div>
    </div>
</nav>

<div class="container mt-4">

    {% block content %}
    {% endblock %}

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
